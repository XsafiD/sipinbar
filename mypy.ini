# ============================================================
# mypy.ini — Konfigurasi static type checking untuk SIPINBAR
# ============================================================
# Dipakai oleh: mypy models/
# AC T-INT-10: tidak ada error kritikal
# ============================================================

[mypy]
# Dependency pihak ketiga (Flask, SQLAlchemy, WTForms) tidak punya stub lengkap
ignore_missing_imports = True

# Flask-SQLAlchemy: `db.Model` adalah atribut dinamis yang dibuat saat runtime
# via `SQLAlchemy(app)`. mypy tidak bisa menyelesaikannya secara statis, sehingga
# memunculkan false-positive `name-defined`. Ini bukan error nyata — semua model
# berfungsi benar saat runtime. Nonaktifkan error code ini untuk menghindari noise.
disable_error_code = name-defined

# Ketat untuk error nyata: implicit Optional (PEP 484) wajib eksplisit
strict_optional = True
